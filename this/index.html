<!DOCTYPE html>
<html>

<head>
    <title>Profile Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-gray-200 min-h-screen p-10">

    <!-- Form -->
    <div class="max-w-md mx-auto bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">

        <h2 class="text-xl font-semibold mb-5 text-center">Create Profile</h2>

        <form class="space-y-4">

            <input type="text" placeholder="Name" id="name"
                class="w-full bg-gray-900 border border-gray-700 rounded-md px-3 py-2 focus:outline-none focus:border-blue-500">

            <input type="text" placeholder="Role" id="role"
                class="w-full bg-gray-900 border border-gray-700 rounded-md px-3 py-2 focus:outline-none focus:border-blue-500">

            <textarea placeholder="Bio" id="bio"
                class="w-full bg-gray-900 border border-gray-700 rounded-md px-3 py-2 focus:outline-none focus:border-blue-500"></textarea>

            <input type="text" placeholder="Photo URL" id="photo"
                class="w-full bg-gray-900 border border-gray-700 rounded-md px-3 py-2 focus:outline-none focus:border-blue-500">

            <button class="w-full bg-blue-600 hover:bg-blue-700 transition rounded-md py-2 font-medium">
                Submit
            </button>

        </form>

    </div>


    <!-- Cards -->
    <div class="users max-w-5xl mx-auto mt-12 grid grid-cols-1 md:grid-cols-3 gap-6">

        



        

    </div>

    <script src="script.js"></script>
</body>

</html>
