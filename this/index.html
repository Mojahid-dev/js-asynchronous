<!DOCTYPE html>
<html>

<head>
    <title>Profile Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-gray-200 min-h-screen p-10">

    <!-- Form -->
    <div class="max-w-md mx-auto bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700">

        <h2 class="text-xl font-semibold mb-5 text-center">Create Profile</h2>

        <form class="space-y-4">

            <input type="text" placeholder="Name"
                class="w-full bg-gray-900 border border-gray-700 rounded-md px-3 py-2 focus:outline-none focus:border-blue-500">

            <input type="text" placeholder="Role"
                class="w-full bg-gray-900 border border-gray-700 rounded-md px-3 py-2 focus:outline-none focus:border-blue-500">

            <textarea placeholder="Bio"
                class="w-full bg-gray-900 border border-gray-700 rounded-md px-3 py-2 focus:outline-none focus:border-blue-500"></textarea>

            <input type="text" placeholder="Photo URL"
                class="w-full bg-gray-900 border border-gray-700 rounded-md px-3 py-2 focus:outline-none focus:border-blue-500">

            <button class="w-full bg-blue-600 hover:bg-blue-700 transition rounded-md py-2 font-medium">
                Submit
            </button>

        </form>

    </div>


    <!-- Cards -->
    <div class="max-w-5xl mx-auto mt-12 grid grid-cols-1 md:grid-cols-3 gap-6">

        <!-- Card -->
        <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 text-center shadow">

            <img src="https://i.pravatar.cc/150?img=5" class="w-20 h-20 rounded-full mx-auto mb-4">

            <h3 class="font-semibold text-lg">John Doe</h3>

            <p class="text-blue-400 text-sm">Frontend Developer</p>

            <p class="text-gray-400 text-sm mt-2">
                Loves building clean UI and interactive web apps.
            </p>

        </div>


        <!-- Card -->
        <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 text-center shadow">

            <img src="https://i.pravatar.cc/150?img=8" class="w-20 h-20 rounded-full mx-auto mb-4">

            <h3 class="font-semibold text-lg">Sarah Lee</h3>

            <p class="text-blue-400 text-sm">Backend Engineer</p>

            <p class="text-gray-400 text-sm mt-2">
                Passionate about scalable APIs and system design.
            </p>

        </div>


        <!-- Card -->
        <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 text-center shadow">

            <img src="https://i.pravatar.cc/150?img=12" class="w-20 h-20 rounded-full mx-auto mb-4">

            <h3 class="font-semibold text-lg">Alex Smith</h3>

            <p class="text-blue-400 text-sm">Full Stack Developer</p>

            <p class="text-gray-400 text-sm mt-2">
                Enjoys building complete products from frontend to backend.
            </p>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
